notes: Piper Sandler Companies is an investment bank and institutional brokerage. It does not
  operate a public, self-service developer API or publish a price book. Any data delivery to
  institutional clients (research, trading, capital-markets) is via licensed institutional
  platforms and bilateral agreements rather than a metered public API.
description: Piper Sandler is a US investment bank and institutional broker-dealer. There is no
  public developer portal or self-service API. Research, trading, and advisory products are
  delivered to institutional clients under bilateral commercial agreements, often via licensed
  market-data and platform vendors.
