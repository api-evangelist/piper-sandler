specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Piper Sandler Companies
providerId: piper-sandler
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Investment Banking
  - Capital Markets
notes: Piper Sandler is an investment bank, not a software / API vendor. There is no public
  metered API to model. This artifact captures the FinOps shape only at the institutional client
  contract level.
description: FOCUS-aligned FinOps placeholder for Piper Sandler. As an investment bank and
  institutional broker-dealer, Piper Sandler bills clients via brokerage commissions, advisory
  fees, and research / platform subscriptions rather than as a metered API SKU.
sources:
  - https://www.pipersandler.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Piper Sandler Companies
serviceCategory: Capital Markets
billingModel:
  pricingCategory: Bilateral Contract
  billingFrequency: Per-Mandate
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Piper Sandler Institutional
  ServiceCategory: Capital Markets
  ServiceSubcategory: Investment Banking and Institutional Brokerage
  ProviderName: Piper Sandler
  PublisherName: Piper Sandler Companies
  InvoiceIssuerName: Piper Sandler Companies
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: institutional_client_contract
    description: Bilateral institutional client mandate (research distribution, trading,
      advisory). Not metered per-call.
    unit: contract
    aggregation: count
    dimensions:
      - product_line
      - region
  - name: brokerage_commission
    description: Per-trade or per-share commission billed at execution. Not API-metered.
    unit: trade
    aggregation: sum
    dimensions:
      - asset_class
principles:
  - name: Visibility
    description: Visibility lives at the brokerage / advisory invoice level rather than at API
      consumption.
  - name: Allocation
    description: Allocate institutional fees and brokerage commissions to the consuming desk /
      strategy / fund.
  - name: Optimization
    description: Optimize via execution-quality reviews and renegotiation of advisory mandates;
      this is not an API-cost-optimization problem.
  - name: Accountability
    description: Buy-side trading desk and finance team own the relationship and review fees per
      mandate.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
