specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Piper Sandler Companies
providerId: piper-sandler
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Investment Banking
  - Capital Markets
notes: Piper Sandler does not publish a public API and therefore does not publish numeric rate
  limits. Any client connectivity uses third-party institutional platforms whose limits are
  governed by those platforms.
description: There is no public Piper Sandler API surface to rate-limit. Institutional client
  connectivity flows over licensed third-party platforms; throttling, if any, is governed by the
  licensed platform rather than by Piper Sandler.
sources:
  - https://www.pipersandler.com/
limits:
  - name: Institutional Client Connectivity
    scope: contract
    metric: varies
    limit: 'governed by the licensed institutional platform; not publicly documented by Piper
      Sandler'
policies:
  - name: Platform-Defined Limits
    description: Rate limits are defined by the licensed market-data / trading platform that
      delivers Piper Sandler content rather than by Piper Sandler directly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
